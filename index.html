<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevBoard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<body class="bg-[#F4F7FF] py-1">
    <header class="bg-[#FFFFFF] mt-3 max-w-[1250px] px-5 py-3 shadow-md rounded-lg mx-auto" id="header">

                </div>
            </div>
            <div class="flex items-center gap-10">

                    </div>

            <div class="grid grid-cols-3 gap-6">
                <div class="bg-[#F4F7FF] p-5 rounded-lg flex items-center gap-2">
                <div class="bg-[#FFFFFF] p-2 rounded-full">

            </div>
             <div class="bg-linear-to-r from-blue-500 to-cyan-500 p-5 rounded-lg flex items-center gap-2">

                </div>
                <div class="text-xl text-[#FFFFFF] font-medium">

                </div>
            </div>
               <div class="bg-[#F4F7FF] p-5 rounded-lg flex items-center gap-2">
                <div class="bg-[#FFFFFF] p-2 rounded-full">
                    <img src="assets/checkbox.png" alt="">
                </div>
                <div class="">
                    <h1 class="text-xl ">Task Assigned</h1>
                    <p class="text-2xl font-bold">0<span>6</span></p>
                </div>
            </div>
            </div>
        </section  >

        <section class="bg-[#FFFFFF] shadow-md p-3 w-[250px] mx-auto">
            <div class="mt-3 flex items-center justify-center gap-3">
                <img src="assets/activity.png" alt="">
                <h1 class="">Activity Log</h1>
            </div>
        </section>
        </div>
    </main>

    <script src="style.js"></script>
